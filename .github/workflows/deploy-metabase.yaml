name: For call - deploy metabase

on:
  workflow_call:
    inputs:
      deploy_env:
        description: "Deploy environment, e.g. dev-only, prod-only, prod-and-dev"
        required: true
        type: string
      image:
        description: "Metabase docker image to deploy"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy-dev:
    name: Deploy to dev-gcp
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' && (inputs.deploy_env == 'dev-only' || inputs.deploy_env == 'prod-and-dev') }}
    steps:
      - uses: actions/checkout@v6
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/dev/metabase/gcp.yaml,.nais/dev/metabase/log-config.yaml
          VAR: image=${{ inputs.image }}
          VARS: .nais/vars.yaml
          WAIT: "false"

  deploy-prod:
    name: Deploy to prod-gcp
    runs-on: ubuntu-latest
    needs: [deploy-dev]
    if: |
      always() &&
      github.actor != 'dependabot[bot]' &&
      (inputs.deploy_env == 'prod-only' || inputs.deploy_env == 'prod-and-dev') &&
      (needs.deploy-dev.result == 'success' || needs.deploy-dev.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/prod/metabase/gcp.yaml,.nais/prod/metabase/log-config.yaml
          VAR: image=${{ inputs.image }}
          VARS: .nais/vars.yaml
          WAIT: "false"

